<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{TITLE}} | Grupo RH — Joel Pacheco</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <meta name="author"  content="{{AUTHOR}}" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://joelgruporh.mx/blog/{{SLUG}}/" />

  <link rel="alternate" hreflang="es" href="https://joelgruporh.mx/blog/{{SLUG}}/" />
  <link rel="alternate" hreflang="en" href="https://joelgruporh.mx/blog/{{SLUG}}/?lang=en" />
  <link rel="alternate" hreflang="x-default" href="https://joelgruporh.mx/blog/{{SLUG}}/" />

  <meta property="og:type"        content="article" />
  <meta property="og:url"         content="https://joelgruporh.mx/blog/{{SLUG}}/" />
  <meta property="og:title"       content="{{TITLE}} | Grupo RH" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:image"       content="https://joelgruporh.mx/{{IMAGE}}" />
  <meta property="og:locale"      content="es_MX" />
  <meta property="article:published_time" content="{{DATE}}T00:00:00-06:00" />
  <meta property="article:author" content="{{AUTHOR}}" />
  <meta property="article:section" content="{{CATEGORY}}" />

  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />
  <meta name="twitter:image"       content="https://joelgruporh.mx/{{IMAGE}}" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{TITLE}}",
    "description": "{{DESCRIPTION}}",
    "image": "https://joelgruporh.mx/{{IMAGE}}",
    "datePublished": "{{DATE}}T00:00:00-06:00",
    "dateModified":  "{{DATE}}T00:00:00-06:00",
    "author": {
      "@type": "Person",
      "name": "{{AUTHOR}}",
      "url": "https://joelgruporh.mx/"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Grupo RH",
      "logo": { "@type": "ImageObject", "url": "https://joelgruporh.mx/assets/images/logo.png" }
    },
    "mainEntityOfPage": "https://joelgruporh.mx/blog/{{SLUG}}/"
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Inicio",     "item": "https://joelgruporh.mx/" },
      { "@type": "ListItem", "position": 2, "name": "Blog",       "item": "https://joelgruporh.mx/blog/" },
      { "@type": "ListItem", "position": 3, "name": "{{TITLE}}",  "item": "https://joelgruporh.mx/blog/{{SLUG}}/" }
    ]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="icon" href="../../assets/images/favicon.ico" type="image/x-icon" />
</head>
<body>

  <!-- NAV (identical to index.html) -->
  <header>
    <nav aria-label="Navegación principal">
      <a href="../../" class="logo" aria-label="Grupo RH — Inicio">GRUPO RH</a>
      <div class="nav-links" role="list">
        <a href="../../#nosotros"    data-es="Nosotros"    data-en="About">Nosotros</a>
        <a href="../../#desarrollos" data-es="Desarrollos" data-en="Developments">Desarrollos</a>
        <a href="../"                data-es="Blog"         data-en="Blog">Blog</a>
        <a href="../../#contacto"   data-es="Contacto"    data-en="Contact">Contacto</a>
      </div>
      <div class="nav-actions">
        <button id="lang-toggle" aria-label="Cambiar idioma">EN</button>
        <button class="hamburger" id="hamburger" aria-label="Abrir menú" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </header>

  <div class="mobile-overlay" id="mobile-overlay"></div>
  <nav class="mobile-drawer" id="mobile-drawer" aria-label="Menú móvil">
    <a href="../../#nosotros"    data-es="Nosotros"    data-en="About">Nosotros</a>
    <a href="../../#desarrollos" data-es="Desarrollos" data-en="Developments">Desarrollos</a>
    <a href="../"                data-es="Blog"         data-en="Blog">Blog</a>
    <a href="../../#contacto"   data-es="Contacto"    data-en="Contact">Contacto</a>
    <button class="drawer-lang">Switch to English</button>
  </nav>

  <main>
    <!-- Post hero -->
    <div class="post-hero">
      <div class="container">
        <nav class="post-breadcrumb" aria-label="Breadcrumb">
          <a href="../../" data-es="Inicio" data-en="Home">Inicio</a>
          <span aria-hidden="true">›</span>
          <a href="../" data-es="Blog" data-en="Blog">Blog</a>
          <span aria-hidden="true">›</span>
          <span>{{TITLE}}</span>
        </nav>
        <h1>{{TITLE}}</h1>
        <div class="post-meta-bar">
          <span class="blog-cat">{{CATEGORY}}</span>
          <time datetime="{{DATE}}">{{DATE_FORMATTED}}</time>
          <span class="author">{{AUTHOR}}</span>
        </div>
      </div>
    </div>

    <!-- Post body -->
    <div class="post-body-wrap">
      {{#if IMAGE}}
      <img class="post-img" src="../../{{IMAGE}}" alt="{{IMAGE_ALT}}" loading="lazy" />
      {{/if}}

      <div class="post-content">
        {{CONTENT}}
      </div>

      <a href="../" class="post-back"
         data-es="← Volver al Blog" data-en="← Back to Blog">← Volver al Blog</a>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-logo">GRUPO RH</span>
        <nav class="footer-links" aria-label="Footer">
          <a href="../../#nosotros"    data-es="Nosotros"    data-en="About">Nosotros</a>
          <a href="../../#desarrollos" data-es="Desarrollos" data-en="Developments">Desarrollos</a>
          <a href="../"                data-es="Blog"         data-en="Blog">Blog</a>
          <a href="../../#contacto"   data-es="Contacto"    data-en="Contact">Contacto</a>
        </nav>
        <p class="footer-copy">&copy; <span id="year"></span> Grupo RH — Joel Pacheco.</p>
      </div>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="../../js/main.js" defer></script>
</body>
</html>
